<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Stormer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #1a1a2e;
        }
        p {
            font-size: 1.25rem;
            color: #555;
            max-width: 600px;
            margin-bottom: 2rem;
        }
        .cta {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #4361ee;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: background 0.2s;
        }
        .cta:hover {
            background: #3a56d4;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Coach Stormer</h1>
        <p>Your AI-powered coaching companion. Coming soon.</p>
        <a href="#" class="cta">Get Started</a>
    </section>
</body>
</html>
